syntax = "proto3";

package qubic.aggregation.ipo.v1;

option go_package = "github.com/qubic/qubic-aggregation/ipo-service/api/ipo/v1";

message IpoBid {
  int64 price = 1;
  uint32 quantity = 2;
}

message BidTransaction {
  string hash = 1;
  uint64 amount = 2;
  string source = 3;
  string destination = 4;
  uint32 tick_number = 5;
  uint64 timestamp = 6;
  uint32 input_type = 7;
  uint32 input_size = 8;
  string input_data = 9;
  string signature = 10;
  bool money_flew = 11;
  IpoBid bid = 12;
}

message IpoBidTransactions {
  string asset_name = 1;
  uint32 contract_index = 2;
  string contract_address = 3;
  repeated BidTransaction transactions = 4;
}

message GetCurrentIpoBidsRequest {
  repeated string identities = 1;
}

message GetCurrentIpoBidsResponse {
  repeated IpoBidTransactions ipo_transactions = 1;
}
