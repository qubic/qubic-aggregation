syntax = "proto3";

package qubic.aggregation.general.v1;

option go_package = "github.com/qubic/qubic-aggregation/general-service/api/general/v1";

message IpoBid {
  int64 price = 1;
  uint32 quantity = 2;
}

message BidTransaction {
  string hash = 1;
  uint64 amount = 2;
  string source = 3;
  string destination = 4;
  uint32 tick_number = 5;
  uint64 timestamp = 6;
  uint32 input_type = 7;
  uint32 input_size = 8;
  string input_data = 9;
  string signature = 10;
  bool money_flew = 11;
  IpoBid bid = 12;
}

message IpoBidTransactions {
  string asset_name = 1;
  uint32 contract_index = 2;
  string contract_address = 3;
  repeated BidTransaction transactions = 4;
}

message GetCurrentIpoBidsRequest {
  repeated string identities = 1;
}

message GetCurrentIpoBidsResponse {
  repeated IpoBidTransactions ipo_transactions = 1;
}

message IdentityBalance {
  string id = 1;
  int64 balance = 2;
  uint32 valid_for_tick = 3;
  uint32 latest_incoming_transfer_tick = 4;
  uint32 latest_outgoing_transfer_tick = 5;
  int64 incoming_amount = 6;
  int64 outgoing_amount = 7;
  uint32 number_of_incoming_transfers = 8;
  uint32 number_of_outgoing_transfers = 9;
}

message GetIdentitiesBalancesRequest {
  repeated string identities = 1;
}

message GetIdentitiesBalancesResponse {
  repeated IdentityBalance balances = 1;
}
